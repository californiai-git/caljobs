name: Daily Job Search Agent

on:
  schedule:
    # Runs at 14:00 UTC every day, which is 7:00 AM PDT / 6:00 AM PST
    - cron: '0 14 * * *'
  workflow_dispatch: # Allows manual trigger from the GitHub UI

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Use the appropriate Python version for your project
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Job Search Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_CREDENTIALS: ${{ secrets.GMAIL_CREDENTIALS }}
          GMAIL_TOKEN_BASE64: ${{ secrets.GMAIL_TOKEN_BASE64 }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: |
          echo "$GMAIL_CREDENTIALS" > credentials.json
          echo "$GMAIL_TOKEN_BASE64" | base64 --decode > token.pickle
          python -m src.cli --run
